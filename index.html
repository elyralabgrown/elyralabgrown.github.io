</style>

function realOrFallback(catId, idx){
  const arr = REAL_IMAGES[catId];
  if(arr && arr.length) return arr[idx % arr.length];
  return null;
}

function svgIcon(catId, seed){
  const hue = 40 + (seed*7 % 20);
  const bg = `hsl(${hue},35%,${10 + (seed%4)*2}%)`;
  const gold = `hsl(45,70%,${55 + (seed%3)*5}%)`;
  const shapes = {
    rings: `<circle cx="50" cy="60" r="26" fill="none" stroke="${gold}" stroke-width="6"/><polygon points="50,18 58,32 42,32" fill="${gold}"/>`,
    necklaces: `<path d="M20,25 Q50,70 80,25" fill="none" stroke="${gold}" stroke-width="4"/><polygon points="50,68 58,82 42,82" fill="${gold}"/>`,
    earrings: `<circle cx="50" cy="30" r="8" fill="${gold}"/><path d="M50,38 L50,75" stroke="${gold}" stroke-width="3"/><polygon points="50,75 58,88 42,88" fill="${gold}"/>`,
    bangles: `<circle cx="50" cy="50" r="32" fill="none" stroke="${gold}" stroke-width="9"/>`,
    mangalsutra: `<path d="M15,20 Q50,55 85,20" fill="none" stroke="${gold}" stroke-width="3"/><circle cx="50" cy="60" r="10" fill="${gold}"/><polygon points="50,68 56,80 44,80" fill="${gold}"/>`
  };
  const shape = shapes[catId] || shapes.rings;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <rect width="100" height="100" fill="${bg}"/>
    ${shape}
    <circle cx="${15 + (seed%5)*15}" cy="${15 + (seed%3)*10}" r="1.2" fill="#fff" opacity="0.6"/>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

function genProducts(catId, count){
  const names = {
    rings:['Solitaire Ring','Halo Diamond Ring','Gold Band Ring','Eternity Ring','Cocktail Ring','Engagement Ring'],
    necklaces:['Diamond Pendant Set','Gold Choker','Temple Necklace','Layered Chain','Bridal Necklace Set'],
    earrings:['Diamond Studs','Jhumka Earrings','Drop Earrings','Hoop Earrings','Chandelier Earrings'],
    bangles:['Gold Kada','Diamond Bangle','Classic Bangle Set','Antique Bangle'],
    mangalsutra:['Traditional Mangalsutra','Diamond Mangalsutra','Modern Design Mangalsutra']
  };
  const priceRanges = {
    rings: [12000, 45000],
    necklaces: [25000, 95000],
    earrings: [10000, 38000],
    bangles: [30000, 110000],
    mangalsutra: [18000, 55000]
  };
  const [minP, maxP] = priceRanges[catId] || [10000, 40000];
  const list = names[catId] || ['Jewellery Item'];
  const items = [];
  for(let i=0;i<count;i++){
    const priceStep = (maxP - minP) / Math.max(count-1,1);
    const price = Math.round((minP + priceStep*i) / 500) * 500;
    items.push({
      id: catId+'_'+i,
      name: list[i % list.length] + ' ' + (Math.floor(i/list.length)+1),
      price: '₹' + price.toLocaleString('en-IN'),
      img: realOrFallback(catId, i) || svgIcon(catId, i+1),
      cat: catId
    });
  }
  return items;
}

let state = {view:'home', cat:null, product:null};

function openCat(catId){ state={view:'category', cat:catId}; render(); window.scrollTo(0,0); }
function openProduct(p){ state={...state, view:'product', product:p}; render(); window.scrollTo(0,0); }

          moments unforgettable.
        </div>
        <div class="insta-tag">📷 Follow us: @elyra.by.shree.creation</div>
      </div>
      <div class="page" style="max-width:500px;">
        <div class="section-title" style="font-size:20px;">Contact Us</div>
        <div class="contact-card">
          <div class="names"><strong>Shreya Poddar</strong> &nbsp;|&nbsp; <strong>Vishvesh Poddar</strong></div>
          <div>📞 9431027748, 8210961619</div>
          <div>✉️ vishveshpoddar@hotmail.com</div>
          <div>📍 Flat No. 133, 4th Floor, Frazer Road, Patna</div>
          <a href="tel:9431027748" style="text-decoration:none;">
            <button class="call-btn" style="margin-top:14px;">📞 Call Now</button>
          </a>
        </div>
      </div>
    `;
  }

  if(state.view==='catalog'){
    app.innerHTML = `
      <div class="page">
        <div class="section-title">Our Collections</div>
        <div class="section-sub">Tap a category to explore</div>
        <div class="price-notice">
          ✦ Prices shown are <strong>approximate</strong> and may vary based on gold weight, diamond carat &amp; quality.
          For accurate, up-to-date pricing, please <a href="tel:9431027748">call us</a> or contact via the details on our Home page.
        </div>
        <div class="cat-grid">
          ${CATEGORIES.map(c=>`
            <div class="cat-box" onclick="openCat('${c.id}')">
              <img src="${realOrFallback(c.id, 0) || svgIcon(c.id, 99)}">
              <div class="cat-name">${c.name}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  if(state.view==='category'){
    const cat = CATEGORIES.find(c=>c.id===state.cat);
    const products = genProducts(cat.id, cat.count);
    app.innerHTML = `
      <div class="page">
        <button class="back-btn-big" onclick="goCatalog()"><span class="arrow">←</span> Back to Catalog</button>
        <div class="section-title">${cat.name}</div>
        <div class="section-sub">${products.length} items</div>
        <div class="price-notice">
          ✦ Prices may vary a lot depending on gold weight &amp; diamond quality. For correct price info, please <a href="#" onclick="goHome();return false;">contact us</a>.
        </div>
        <div class="prod-grid">
          ${products.map(p=>`
            <div class="prod-card" onclick='openProduct(${JSON.stringify(p)})'>
              <img src="${p.img}">
              <div class="pname">${p.name}</div>
              <div class="pprice">${p.price}</div>
            </div>
          `).join('')}
        </div>
      </div>

  if(state.view==='product'){
    const p = state.product;
    app.innerHTML = `
      <div class="page">
        <button class="back-btn-big" onclick="openCat('${p.cat}')"><span class="arrow">←</span> Back to ${CATEGORIES.find(c=>c.id===p.cat).name}</button>

        </div>
        <button class="back-btn-big" onclick="goCatalog()" style="margin-top:30px;"><span class="arrow">←</span> Back to Catalog</button>
      </div>
    `;
  }
}

render();
</script>
