<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elyra by Shree Creation</title>
<style>
  :root{
    --gold:#d4af37;
    --gold-light:#f3d978;
    --bg:#0b0b0d;
    --bg2:#15151a;
    --card:#1c1c22;
    --text:#f1ead8;
    --muted:#a99f8c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Georgia','Times New Roman',serif;
    min-height:100vh;
  }
  .header{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg,rgba(11,11,13,0.97),rgba(11,11,13,0.9));
    border-bottom:1px solid rgba(212,175,55,0.3);
    padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{
    display:flex;align-items:center;gap:10px;cursor:pointer;
  }
  .logo-mark{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,var(--gold-light),var(--gold) 60%,#8a6d1a);
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;color:#1a1a1a;font-size:14px;font-family:serif;
    box-shadow:0 0 12px rgba(212,175,55,0.5);
  }
  .logo-text{font-size:18px;letter-spacing:2px;color:var(--gold-light);}
  .logo-text small{display:block;font-size:9px;letter-spacing:1px;color:var(--muted);font-style:italic;}
  .nav-btn{
    background:transparent;border:1px solid var(--gold);
    color:var(--gold-light);padding:8px 16px;border-radius:30px;
    cursor:pointer;font-size:13px;letter-spacing:1px;
    transition:all .25s;
  }
  .nav-btn:hover{background:var(--gold);color:#111;}
  .back-btn{
    background:none;border:none;color:var(--gold-light);
    cursor:pointer;font-size:14px;padding:6px 0;margin-bottom:10px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .back-btn:hover{color:var(--gold);}

  /* HERO / HOME */
  .hero{
    position:relative;
    min-height:78vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    overflow:hidden;
    padding:40px 20px;
    background:
      radial-gradient(circle at 50% 20%, rgba(212,175,55,0.12), transparent 60%),
      linear-gradient(160deg,#0b0b0d, #131318 60%, #0b0b0d);
  }
  .hero-photo-strip{
    display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;
  }
  .hero-photo{
    width:90px;height:120px;border-radius:8px;object-fit:cover;
    border:1px solid rgba(212,175,55,0.4);
    box-shadow:0 6px 18px rgba(0,0,0,0.6);
    transform:translateY(0);transition:transform .3s;
  }
  .hero-photo:hover{transform:translateY(-6px);}
  .hero-title{
    font-size:42px;letter-spacing:4px;color:var(--gold-light);
    text-shadow:0 0 20px rgba(212,175,55,0.4);
    margin-bottom:6px;
  }
  .hero-sub{
    font-size:15px;letter-spacing:3px;color:var(--muted);
    margin-bottom:30px;text-transform:uppercase;
  }
  .cta-btn{
    background:linear-gradient(135deg,var(--gold-light),var(--gold));
    color:#111;border:none;padding:14px 38px;
    border-radius:30px;font-size:14px;letter-spacing:2px;
    cursor:pointer;font-weight:bold;text-transform:uppercase;
    box-shadow:0 8px 24px rgba(212,175,55,0.35);
    transition:transform .2s;
  }
  .cta-btn:hover{transform:translateY(-3px);}
  .about-strip{
    max-width:600px;margin:30px auto 0;color:var(--muted);font-size:14px;line-height:1.7;
    padding:0 10px;
  }
  .insta-tag{
    margin-top:18px;color:var(--gold-light);font-size:13px;letter-spacing:1px;
  }

  /* CATALOG CATEGORIES */
  .page{padding:30px 20px 60px;max-width:1100px;margin:0 auto;}
  .section-title{
    text-align:center;font-size:26px;letter-spacing:3px;color:var(--gold-light);
    margin-bottom:8px;
  }
  .section-sub{
    text-align:center;color:var(--muted);font-size:13px;margin-bottom:30px;letter-spacing:1px;
  }
  .cat-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:16px;
  }
  .cat-box{
    background:var(--card);
    border:1px solid rgba(212,175,55,0.25);
    border-radius:12px;
    overflow:hidden;cursor:pointer;
    transition:transform .25s, box-shadow .25s;
    text-align:center;
  }
  .cat-box:hover{transform:translateY(-5px);box-shadow:0 10px 26px rgba(212,175,55,0.18);}
  .cat-box img{width:100%;height:130px;object-fit:cover;display:block;}
  .cat-box .cat-name{
    padding:10px 6px;font-size:14px;letter-spacing:1.5px;color:var(--gold-light);
  }

  /* PRODUCT GRID */
  .prod-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:16px;margin-top:10px;
  }
  .prod-card{
    background:var(--card);border:1px solid rgba(212,175,55,0.2);
    border-radius:10px;overflow:hidden;cursor:pointer;
    transition:transform .2s,box-shadow .2s;
  }
  .prod-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(212,175,55,0.15);}
  .prod-card img{width:100%;height:150px;object-fit:cover;display:block;}
  .prod-card .pname{padding:8px 10px;font-size:12.5px;color:var(--text);letter-spacing:0.5px;}
  .prod-card .pprice{padding:0 10px 10px;font-size:12px;color:var(--gold-light);}

  /* PRODUCT DETAIL */
  .detail-wrap{
    max-width:480px;margin:0 auto;text-align:center;
  }
  .detail-img{
    width:100%;border-radius:14px;
    border:1px solid rgba(212,175,55,0.35);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    max-height:480px;object-fit:cover;
  }
  .detail-name{font-size:22px;color:var(--gold-light);margin-top:20px;letter-spacing:1px;}
  .detail-price{font-size:16px;color:var(--muted);margin-top:6px;}
  .call-btn{
    margin-top:24px;
    background:linear-gradient(135deg,var(--gold-light),var(--gold));
    color:#111;border:none;padding:14px 30px;border-radius:30px;
    font-size:14px;letter-spacing:1.5px;cursor:pointer;font-weight:bold;
    display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 8px 22px rgba(212,175,55,0.3);
  }
  footer{
    text-align:center;padding:24px;color:var(--muted);font-size:12px;
    border-top:1px solid rgba(212,175,55,0.15);letter-spacing:1px;
  }
  @media(max-width:480px){
    .hero-title{font-size:30px;}
    .hero-photo{width:65px;height:90px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()">
    <div class="logo-mark" style="background:transparent;box-shadow:none;width:34px;height:34px;">
      <img src="https://i.imgur.com/x01lGMc.jpeg" style="width:100%;height:100%;object-fit:contain;">
    </div>
    <div class="logo-text">ELYRA<small>by Shree Creations</small></div>
  </div>
  <button class="nav-btn" onclick="goCatalog()">Catalog</button>
</div>

<div id="app"></div>

<footer>© 2026 Elyra by Shree Creation — Premium Gold & Diamond Jewellery</footer>

<script>
const CATEGORIES = [
  {id:'rings', name:'Rings', icon:'💍', count:12},
  {id:'necklaces', name:'Necklaces', icon:'📿', count:12},
  {id:'earrings', name:'Earrings', icon:'✨', count:12},
  {id:'bangles', name:'Bangles', icon:'⭕', count:10},
  {id:'mangalsutra', name:'Mangalsutra', icon:'🔗', count:8},
];

// Self-contained SVG jewelry placeholder generator (no external images needed)
function svgIcon(catId, seed){
  const hue = 40 + (seed*7 % 20); // gold tones
  const bg = `hsl(${hue},35%,${10 + (seed%4)*2}%)`;
  const gold = `hsl(45,70%,${55 + (seed%3)*5}%)`;
  const shapes = {
    rings: `<circle cx="50" cy="60" r="26" fill="none" stroke="${gold}" stroke-width="6"/><polygon points="50,18 58,32 42,32" fill="${gold}"/>`,
    necklaces: `<path d="M20,25 Q50,70 80,25" fill="none" stroke="${gold}" stroke-width="4"/><polygon points="50,68 58,82 42,82" fill="${gold}"/>`,
    earrings: `<circle cx="50" cy="30" r="8" fill="${gold}"/><path d="M50,38 L50,75" stroke="${gold}" stroke-width="3"/><polygon points="50,75 58,88 42,88" fill="${gold}"/>`,
    bangles: `<circle cx="50" cy="50" r="32" fill="none" stroke="${gold}" stroke-width="9"/>`,
    mangalsutra: `<path d="M15,20 Q50,55 85,20" fill="none" stroke="${gold}" stroke-width="3"/><circle cx="50" cy="60" r="10" fill="${gold}"/><polygon points="50,68 56,80 44,80" fill="${gold}"/>`
  };
  const shape = shapes[catId] || shapes.rings;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <rect width="100" height="100" fill="${bg}"/>
    ${shape}
    <circle cx="${15 + (seed%5)*15}" cy="${15 + (seed%3)*10}" r="1.2" fill="#fff" opacity="0.6"/>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
function imgFor(seed){
  // fallback generic sparkle tile when no category context
  return svgIcon('rings', hashStr(seed));
}
function hashStr(s){
  let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}
  return h % 100;
}

function genProducts(catId, count){
  const names = {
    rings:['Solitaire Ring','Halo Diamond Ring','Gold Band Ring','Eternity Ring','Cocktail Ring','Engagement Ring'],
    necklaces:['Diamond Pendant Set','Gold Choker','Temple Necklace','Layered Chain','Bridal Necklace Set'],
    earrings:['Diamond Studs','Jhumka Earrings','Drop Earrings','Hoop Earrings','Chandelier Earrings'],
    bangles:['Gold Kada','Diamond Bangle','Classic Bangle Set','Antique Bangle'],
    mangalsutra:['Traditional Mangalsutra','Diamond Mangalsutra','Modern Design Mangalsutra']
  };
  const list = names[catId] || ['Jewellery Item'];
  const items = [];
  for(let i=0;i<count;i++){
    items.push({
      id: catId+'_'+i,
      name: list[i % list.length] + ' ' + (Math.floor(i/list.length)+1),
      price: '₹' + (15000 + (i*3500)).toLocaleString('en-IN'),
      img: svgIcon(catId, i+1),
      cat: catId
    });
  }
  return items;
}

let state = {view:'home', cat:null, product:null};

function goHome(){ state={view:'home'}; render(); }
function goCatalog(){ state={view:'catalog'}; render(); }
function openCat(catId){ state={view:'category', cat:catId}; render(); }
function openProduct(p){ state={...state, view:'product', product:p}; render(); }
function backFromCategory(){ state={view:'catalog'}; render(); }
function backFromProduct(){ render(); state.view='category'; render(); }

function render(){
  const app = document.getElementById('app');

  if(state.view==='home'){
    app.innerHTML = `
      <div class="hero">
        <img src="https://i.imgur.com/x01lGMc.jpeg" style="width:80px;height:80px;object-fit:contain;margin-bottom:10px;">
        <div class="hero-photo-strip">
          ${[1,2,3,4,5].map(i=>`<img class="hero-photo" src="${imgFor('hero'+i)}">`).join('')}
        </div>
        <div class="hero-title">ELYRA</div>
        <div class="hero-sub">Shree Creations</div>
        <div style="color:var(--gold-light);font-size:14px;letter-spacing:1px;margin-bottom:6px;font-style:italic;">
          Eternal stars that doesn't cost the Earth
        </div>
        <div style="color:var(--muted);font-size:13px;letter-spacing:1px;margin-bottom:28px;">
          Labgrown &amp; Natural Diamonds
        </div>
        <button class="cta-btn" onclick="goCatalog()">View Catalog</button>
        <div class="about-strip">
          Elyra by Shree Creations brings you premium gold &amp; diamond jewellery,
          crafted with elegance and trust. Every piece is made to make your
          moments unforgettable.
        </div>
        <div class="insta-tag">📷 Follow us: @elyra.by.shree.creation</div>
      </div>
      <div class="page" style="max-width:500px;">
        <div class="section-title" style="font-size:20px;">Contact Us</div>
        <div style="background:var(--card);border:1px solid rgba(212,175,55,0.25);border-radius:14px;padding:22px;text-align:center;color:var(--text);font-size:14px;line-height:2;">
          <div><strong style="color:var(--gold-light);">Shreya Poddar</strong> &nbsp;|&nbsp; <strong style="color:var(--gold-light);">Vishvesh Poddar</strong></div>
          <div>📞 9431027748, 8210961619</div>
          <div>✉️ vishveshpoddar@hotmail.com</div>
          <div>📍 Flat No. 133, 4th Floor, Frazer Road, Patna</div>
          <a href="tel:9431027748" style="text-decoration:none;">
            <button class="call-btn" style="margin-top:14px;">📞 Call Now</button>
          </a>
        </div>
      </div>
    `;
  }

  if(state.view==='catalog'){
    app.innerHTML = `
      <div class="page">
        <div class="section-title">Our Collections</div>
        <div class="section-sub">Tap a category to explore</div>
        <div class="cat-grid">
          ${CATEGORIES.map(c=>`
            <div class="cat-box" onclick="openCat('${c.id}')">
              <img src="${svgIcon(c.id, 99)}">
              <div class="cat-name">${c.name}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  if(state.view==='category'){
    const cat = CATEGORIES.find(c=>c.id===state.cat);
    const products = genProducts(cat.id, cat.count);
    app.innerHTML = `
      <div class="page">
        <button class="back-btn" onclick="goCatalog()">← Back to Catalog</button>
        <div class="section-title">${cat.name}</div>
        <div class="section-sub">${products.length} items</div>
        <div class="prod-grid">
          ${products.map(p=>`
            <div class="prod-card" onclick='openProduct(${JSON.stringify(p)})'>
              <img src="${p.img}">
              <div class="pname">${p.name}</div>
              <div class="pprice">${p.price}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  if(state.view==='product'){
    const p = state.product;
    app.innerHTML = `
      <div class="page">
        <button class="back-btn" onclick="openCat('${p.cat}')">← Back to ${CATEGORIES.find(c=>c.id===p.cat).name}</button>
        <div class="detail-wrap">
          <img class="detail-img" src="${p.img}">
          <div class="detail-name">${p.name}</div>
          <div class="detail-price">${p.price}</div>
          <div>
            <button class="call-btn" onclick="window.location.href='tel:9431027748'">
              📞 Interested? Call Now
            </button>
          </div>
        </div>
      </div>
    `;
  }
}

render();
</script>
</body>
</html>

Then commit changes and your luxury website will work with clickable category buttons and galleries.
